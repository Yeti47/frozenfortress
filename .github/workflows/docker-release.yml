name: Docker Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      tag_name:
        description: 'Tag name (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Extract version
      id: extract_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
          TAG_NAME="${{ github.event.inputs.tag_name }}"
        else
          VERSION=${GITHUB_REF#refs/tags/v}
          TAG_NAME=${GITHUB_REF#refs/tags/}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
        echo "Tag: $TAG_NAME"

    - name: Build images
      run: docker compose build

    - name: Log in to GHCR
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push images to GHCR and capture digests
      id: push_images
      run: |
        REGISTRY="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
        VERSION="${{ steps.extract_version.outputs.version }}"

        push_image() {
          local local_name="$1"
          local remote_name="$2"
          local tag="${REGISTRY}/${remote_name}:${VERSION}"

          docker tag "$local_name" "$tag"
          docker push "$tag"

          # Resolve the repo digest (ghcr.io/...@sha256:...)
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$tag")
          echo "$digest"
        }

        WEBUI_DIGEST=$(push_image  frozenfortress-webui  frozenfortress/webui)
        NGINX_DIGEST=$(push_image  frozenfortress-nginx  frozenfortress/nginx)
        OLLAMA_DIGEST=$(push_image frozenfortress-ollama frozenfortress/ollama)

        echo "webui_digest=$WEBUI_DIGEST"   >> $GITHUB_OUTPUT
        echo "nginx_digest=$NGINX_DIGEST"   >> $GITHUB_OUTPUT
        echo "ollama_digest=$OLLAMA_DIGEST" >> $GITHUB_OUTPUT

    - name: Generate compose.release.yaml
      run: |
        python3 - << 'PYEOF'
        import re

        with open('compose.yaml') as f:
            src = f.read()

        webui_digest  = "${{ steps.push_images.outputs.webui_digest }}"
        nginx_digest  = "${{ steps.push_images.outputs.nginx_digest }}"
        ollama_digest = "${{ steps.push_images.outputs.ollama_digest }}"

        # Replace each service's build block with an image reference.
        # The build blocks differ in indentation and content but all follow the pattern:
        #   build:\n      context: <path>
        def replace_build(service, digest, text):
            pattern = (
                r'(?m)'                         # multiline
                r'(^  ' + service + r':.*?\n)'  # service header line
                r'((?:    .+\n)*?)'             # any lines before build (captured)
                r'    build:\n'                  # build: line
                r'      context: .+\n'           # context: line
            )
            replacement = (
                r'\1\2'
                r'    image: ' + digest + r'\n'
            )
            return re.sub(pattern, replacement, text)

        src = replace_build('nginx',  nginx_digest,  src)
        src = replace_build('webui',  webui_digest,  src)
        src = replace_build('ollama', ollama_digest, src)

        with open('compose.release.yaml', 'w') as f:
            f.write(src)

        print("compose.release.yaml generated successfully.")
        PYEOF

    - name: Assemble release archive
      run: |
        RELEASE_DIR="frozenfortress-docker-v${{ steps.extract_version.outputs.version }}"
        mkdir -p "$RELEASE_DIR"
        cp compose.release.yaml "$RELEASE_DIR/compose.yaml"
        cp .env.example "$RELEASE_DIR/"
        cp doc/setup-docker.md "$RELEASE_DIR/"
        cp README.md "$RELEASE_DIR/"
        zip -r "${RELEASE_DIR}.zip" "$RELEASE_DIR/"
        echo "RELEASE_ZIP=${RELEASE_DIR}.zip" >> $GITHUB_ENV

    - name: Check if release already exists
      id: check_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view "${{ steps.extract_version.outputs.tag_name }}" > /dev/null 2>&1; then
          echo "Release already exists for tag ${{ steps.extract_version.outputs.tag_name }}, skipping."
          echo "skip_release=true" >> $GITHUB_OUTPUT
        else
          echo "skip_release=false" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Release
      if: steps.check_release.outputs.skip_release == 'false'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat > release_notes.md << 'EOF'
        ## Frozen Fortress v${{ steps.extract_version.outputs.version }}

        Docker-native release. Pre-built images are published to GHCR — no build step required.

        **Requirements:**
        - Docker Engine with Compose plugin

        **Quick start:**
        1. Download and extract the release archive
        2. Copy `.env.example` to `.env` and adjust as needed
        3. Run `docker compose pull && docker compose up -d`

        **Images (digest-pinned):**
        - `${{ steps.push_images.outputs.webui_digest }}`
        - `${{ steps.push_images.outputs.nginx_digest }}`
        - `${{ steps.push_images.outputs.ollama_digest }}`

        See `setup-docker.md` for full setup instructions.

        **Commit:** ${{ github.sha }}
        EOF

        gh release create "${{ steps.extract_version.outputs.tag_name }}" \
          "${{ env.RELEASE_ZIP }}" \
          --title "Frozen Fortress v${{ steps.extract_version.outputs.version }}" \
          --notes-file release_notes.md

        echo "Release created successfully!"

